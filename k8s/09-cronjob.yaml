apiVersion: batch/v1
kind: CronJob
metadata:
  name: agroscrapper
  namespace: agroscrapper
spec:
  schedule: "0 9 * * *"
  timeZone: "Atlantic/Canary"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: migrate
              image: ghcr.io/daklon/agroscrapper-bot:latest
              imagePullPolicy: IfNotPresent
              command: ["/agroscrapper", "-migrate"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: database-url
                - name: TELEGRAM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-token
                - name: TELEGRAM_CHATID
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-chatid
                - name: TELEGRAM_THREADID
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-threadid
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          containers:
            - name: agroscrapper
              image: ghcr.io/daklon/agroscrapper-bot:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: database-url
                - name: TELEGRAM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-token
                - name: TELEGRAM_CHATID
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-chatid
                - name: TELEGRAM_THREADID
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: telegram-threadid
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
